[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
asyncio_mode = auto
markers =
    unit: Unit tests (no external services needed)
    integration: Integration tests (requires DB/MinIO)
    e2e: End-to-end tests (requires server running)
    manual: Manual/interactive tests
    slow: Slow tests that may take a while
    asyncio: Async tests
